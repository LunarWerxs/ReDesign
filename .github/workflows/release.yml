name: Release

# Tag a version (e.g. `git tag v0.1.0 && git push --tags`) to build the compiled binary on
# each OS and publish them to a GitHub Release. The single self-contained binary IS the product,
# so it ships as a first-class, CI-produced artifact rather than a local build.
#
# NOTE: arch labels below are nominal (ubuntu→x64, macos-latest→arm64). Adjust the matrix /
# `bun build --compile --target` in scripts/build.ts if you need additional arch variants.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: redesign-linux-x64
          - os: macos-latest
            asset: redesign-macos-arm64
          - os: windows-latest
            asset: redesign-windows-x64.exe
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - run: bun install --frozen-lockfile
      - run: bun run dist # scripts/build.ts: npm --prefix src/web build, then bun --compile
      - name: Stage compiled binary
        shell: bash
        run: |
          mkdir -p out
          if [ -f dist/redesign.exe ]; then bin=dist/redesign.exe
          elif [ -f dist/redesign ]; then bin=dist/redesign
          else echo "::error::no compiled binary found in dist/"; ls -la dist || true; exit 1; fi
          cp "$bin" "out/${{ matrix.asset }}"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: out/${{ matrix.asset }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
